syntax = "proto3";

package name_node;

service NameNode {
    rpc Write (stream NameWriteRequest) returns (NameWriteResponse);
    rpc Read (NameReadRequest) returns (stream NameReadResponse);
}

message NameWriteRequest {
    string fileName = 1;
    bytes data = 4;
}

message NameWriteResponse {
    bool success = 1;
}

message NameReadRequest {
    string fileName = 1;
}

message NameReadResponse {
    string fileName = 1;
    bytes data = 4;
}
